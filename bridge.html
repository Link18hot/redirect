<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Đang tải...</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d0d0d; color: #f0f0f0;
      font-family: 'Syne', sans-serif;
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; text-align: center; padding: 24px;
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background: radial-gradient(ellipse 60% 50% at 50% 50%, rgba(238,77,45,0.12) 0%, transparent 70%);
      pointer-events: none;
    }
    .logo { font-size: 64px; margin-bottom: 20px; animation: pulse 1.2s ease-in-out infinite alternate; }
    @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.1); } }
    .title { font-size: 1.3rem; font-weight: 800; margin-bottom: 8px; }
    .sub { color: #555; font-size: 0.82rem; font-family: sans-serif; margin-bottom: 32px; }
    .btn-dest {
      display: block; width: 100%; max-width: 300px;
      padding: 16px; border-radius: 14px;
      font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 700;
      text-decoration: none; color: #f0f0f0;
      background: #1e1e1e; border: 1px solid #333;
    }
  </style>
</head>
<body>
  <div class="logo">🛍️</div>
  <div class="title">Đang mở Shopee...</div>
  <div class="sub">Xem xong Shopee, bấm nút bên dưới để tiếp tục</div>
  <a id="btnDest" class="btn-dest" href="#">⏭️ Đến trang đích</a>

<script>
  const params = new URLSearchParams(window.location.search);
  const shopee = params.get('s');
  const dest   = params.get('d');

  if (!shopee || !dest) {
    document.querySelector('.logo').textContent = '⚠️';
    document.querySelector('.title').textContent = 'Link không hợp lệ';
    document.querySelector('.sub').textContent = 'Thiếu tham số s hoặc d';
    document.getElementById('btnDest').style.display = 'none';
  } else {
    // Gán link đích vào nút — luôn hiển thị sẵn
    document.getElementById('btnDest').href = dest;

    // Tự động mở Shopee ngay khi trang load
    window.open(shopee, '_blank');
  }
</script>
</body>
</html>
