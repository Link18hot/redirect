<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Đang tải...</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d0d0d; color: #f0f0f0;
      font-family: sans-serif;
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; text-align: center; padding: 24px;
    }
    .logo { font-size: 64px; margin-bottom: 20px; animation: pulse 1s ease-in-out infinite alternate; }
    @keyframes pulse { from{transform:scale(1)} to{transform:scale(1.08)} }
    p { color: #777; font-size: 0.9rem; }
  </style>
</head>
<body>
  <div class="logo">🛍️</div>
  <p>Đang mở Shopee...</p>

<script>
  const params = new URLSearchParams(window.location.search);
  const shopee = params.get('s');
  const dest = params.get('d');

  if (shopee && dest) {
    // Bước 1: Đẩy trang go.html vào lịch sử trước
    // Khi khách bấm Back từ Shopee → sẽ về go.html với link đích
    const goURL = window.location.href.replace('bridge.html', 'go.html') + '?d=' + encodeURIComponent(dest);
    
    // Thay thế trang hiện tại bằng go.html trong history
    history.replaceState(null, '', goURL);
    
    // Bước 2: Đẩy Shopee vào history → khách đang ở Shopee
    // Bấm Back → về go.html
    setTimeout(() => {
      window.location.assign(decodeURIComponent(shopee));
    }, 800);
  } else {
    document.querySelector('p').textContent = 'Link không hợp lệ.';
  }
</script>
</body>
</html>
