<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Đang tải...</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0d0d;
      color: #f0f0f0;
      font-family: sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 32px 24px;
      overflow: hidden;
      cursor: pointer;
      user-select: none;
      position: relative;
    }

    /* Background video */
    #bgVideo {
      position: fixed;
      inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      z-index: 0;
      opacity: 0.35;
      display: none;
    }

    /* Background image */
    #bgImg {
      position: fixed;
      inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      z-index: 0;
      opacity: 0.35;
      display: none;
    }

    /* Overlay tối lên trên background */
    .bg-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      z-index: 1;
      pointer-events: none;
    }

    /* Lớp phủ toàn màn hình → Shopee */
    #overlay {
      position: fixed;
      inset: 0;
      z-index: 10;
      cursor: pointer;
    }

    .container {
      position: relative;
      z-index: 20;
      width: 100%;
      max-width: 360px;
      pointer-events: none;
    }

    .play-ring {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: linear-gradient(135deg, #ee4d2d, #ff7337);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 28px;
      position: relative;
      animation: pulse 2s ease-in-out infinite;
    }

    .play-ring::after {
      content: '';
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      border: 2px solid rgba(238,77,45,0.3);
      animation: ring-expand 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(238,77,45,0.5), 0 8px 32px rgba(238,77,45,0.35); }
      50%       { box-shadow: 0 0 0 14px rgba(238,77,45,0), 0 8px 32px rgba(238,77,45,0.5); }
    }

    @keyframes ring-expand {
      0%   { transform: scale(1);   opacity: 0.6; }
      100% { transform: scale(1.4); opacity: 0;   }
    }

    .play-icon { font-size: 36px; margin-left: 4px; }

    .title {
      font-size: 1.5rem;
      font-weight: 800;
      margin-bottom: 10px;
      line-height: 1.2;
    }

    .subtitle {
      font-size: 0.88rem;
      color: #aaa;
      margin-bottom: 28px;
      line-height: 1.5;
    }

    #countdown-text {
      font-size: 0.85rem;
      color: #999;
      margin-bottom: 16px;
      height: 20px;
    }

    .btn-main {
      display: block;
      width: 100%;
      padding: 18px 24px;
      border-radius: 16px;
      font-size: 1.05rem;
      font-weight: 700;
      text-decoration: none;
      color: #fff;
      background: linear-gradient(135deg, #ee4d2d, #ff7337);
      box-shadow: 0 6px 24px rgba(238,77,45,0.4);
      border: none;
      position: relative;
      overflow: hidden;
      pointer-events: none;
    }

    .btn-main::after {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 60%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
      animation: shimmer 3s ease-in-out infinite;
    }

    @keyframes shimmer {
      0%        { left: -100%; }
      50%, 100% { left: 150%; }
    }

    .btn-skip {
      display: block;
      width: 100%;
      margin-top: 14px;
      padding: 16px 24px;
      border-radius: 16px;
      font-size: 1rem;
      font-weight: 700;
      text-decoration: none;
      color: #000;
      background: #00c853;
      border: none;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
      position: relative;
      z-index: 30;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(0,200,83,0.4);
    }

    .btn-skip.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .btn-error {
      display: block;
      width: 100%;
      padding: 18px 24px;
      border-radius: 16px;
      font-size: 1rem;
      font-weight: 700;
      color: #888;
      background: #1e1e1e;
      border: 1px solid #2a2a2a;
      text-align: center;
    }
  </style>
</head>
<body>

<video id="bgVideo" autoplay muted loop playsinline></video>
<img id="bgImg" alt=""/>
<div class="bg-overlay"></div>
<div id="overlay"></div>

<div class="container">
  <div class="play-ring">
    <span class="play-icon">▶</span>
  </div>
  <div class="title">Nội dung 18+ đang chờ bạn</div>
  <div class="subtitle">Vui lòng xem qua quảng cáo để tiếp tục</div>

  <div id="countdown-text"></div>

  <a id="btnMain" class="btn-main" href="#">▶ Ấn để xem Clip 18+ &nbsp;[ADs]</a>
  <a id="btnSkip" class="btn-skip" href="#">⏭ Bỏ qua quảng cáo để xem Clip 18+</a>
</div>

<script>
  var params  = new URLSearchParams(window.location.search);
  var shopee  = params.get('s');
  var dest    = params.get('d');
  var video   = params.get('v');
  var bgimg   = params.get('bg');

  var overlay  = document.getElementById('overlay');
  var btnMain  = document.getElementById('btnMain');
  var btnSkip  = document.getElementById('btnSkip');
  var cdText   = document.getElementById('countdown-text');
  var bgVideo  = document.getElementById('bgVideo');
  var bgImgEl  = document.getElementById('bgImg');

  // Background: video ưu tiên
  if (video) {
    bgVideo.src = video;
    bgVideo.style.display = 'block';
  } else if (bgimg) {
    bgImgEl.src = bgimg;
    bgImgEl.style.display = 'block';
  }

  function openExternal(url) {
    var isAndroid = /android/i.test(navigator.userAgent);
    if (isAndroid) {
      var intent = 'intent://' + url.replace(/^https?:\/\//, '') +
        '#Intent;scheme=https;package=com.android.chrome;end';
      window.location.href = intent;
      setTimeout(function() { window.location.href = url; }, 1200);
    } else {
      window.location.href = url;
    }
  }

  if (!shopee || !dest) {
    btnMain.className = 'btn-error';
    btnMain.textContent = '⚠️ Link không hợp lệ';
    btnMain.removeAttribute('href');
    btnSkip.style.display = 'none';
    overlay.style.display = 'none';
    cdText.style.display  = 'none';
  } else {
    overlay.addEventListener('click', function() {
      window.location.href = shopee;
    });

    btnMain.href = shopee;

    var count = 10;
    cdText.textContent = '⏳ Bỏ qua quảng cáo sau ' + count + 's...';
    var timer = setInterval(function() {
      count--;
      if (count > 0) {
        cdText.textContent = '⏳ Bỏ qua quảng cáo sau ' + count + 's...';
      } else {
        clearInterval(timer);
        cdText.textContent = '';
        btnSkip.classList.add('visible');
      }
    }, 1000);

    btnSkip.addEventListener('click', function(e) {
      e.stopPropagation();
      e.preventDefault();
      openExternal(dest);
    });
  }
</script>
</body>
</html>
