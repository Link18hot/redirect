<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Đang tải...</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d0d0d; color: #f0f0f0; font-family: sans-serif;
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; text-align: center; padding: 24px;
    }
    .logo { font-size: 64px; margin-bottom: 20px; animation: pulse 1s ease-in-out infinite alternate; }
    @keyframes pulse { from{transform:scale(1)} to{transform:scale(1.08)} }
    p { color: #777; font-size: 0.9rem; margin-top: 8px; }
  </style>
</head>
<body>
  <div class="logo">🛍️</div>
  <p>Đang mở Shopee...</p>

<script>
  const params = new URLSearchParams(window.location.search);
  const shopee = params.get('s');
  const dest = params.get('d');

  if (shopee && dest) {
    const shopeeURL = decodeURIComponent(shopee);
    const destURL = decodeURIComponent(dest);

    // Bước 1: Thay URL hiện tại thành link đích
    // Khi thoát app Shopee → trình duyệt hiện link đích luôn
    history.replaceState(null, '', destURL);

    // Bước 2: Mở app Shopee bằng deep link (không bị chặn)
    setTimeout(() => {
      // Thử mở app Shopee trước
      const deepLink = 'intent://' + shopeeURL.replace(/^https?:\/\//, '') + '#Intent;scheme=https;package=com.shopee.vn;S.browser_fallback_url=' + encodeURIComponent(shopeeURL) + ';end';
      window.location.href = deepLink;

      // Nếu không có app → sau 2 giây mở trình duyệt
      setTimeout(() => {
        window.location.href = shopeeURL;
      }, 2000);
    }, 500);

  } else {
    document.querySelector('p').textContent = 'Link không hợp lệ.';
  }
</script>
</body>
</html>
