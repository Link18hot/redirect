<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Quản lý Link</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0a0a0a; --surface: #141414; --surface2: #1e1e1e;
      --border: #2a2a2a; --accent: #ee4d2d; --accent2: #ff7337;
      --text: #f0f0f0; --muted: #666; --green: #22c55e; --red: #ef4444;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; padding: 24px 16px; }
    body::before { content: ''; position: fixed; inset: 0; background: radial-gradient(ellipse 50% 30% at 80% 10%, rgba(238,77,45,0.08) 0%, transparent 70%); pointer-events: none; }
    .header { display: flex; align-items: center; gap: 14px; margin-bottom: 28px; }
    .header-logo { width: 44px; height: 44px; border-radius: 12px; background: linear-gradient(135deg, var(--accent), var(--accent2)); display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; box-shadow: 0 4px 16px rgba(238,77,45,0.3); }
    .header h1 { font-family: 'Syne', sans-serif; font-size: 1.3rem; font-weight: 800; }
    .header p { color: var(--muted); font-size: 0.8rem; margin-top: 2px; }
    .add-form { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 20px; margin-bottom: 24px; }
    .add-form h2 { font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 700; margin-bottom: 16px; }
    .form-group { margin-bottom: 12px; }
    .form-group label { display: block; font-size: 0.78rem; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
    .form-group input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.88rem; outline: none; transition: border 0.2s; }
    .form-group input:focus { border-color: var(--accent); }
    .form-group input::placeholder { color: var(--muted); }
    .btn-add { width: 100%; background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; border: none; padding: 14px; border-radius: 12px; font-family: 'Syne', sans-serif; font-size: 0.95rem; font-weight: 700; cursor: pointer; margin-top: 4px; box-shadow: 0 4px 16px rgba(238,77,45,0.3); }
    .list-header { font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 700; margin-bottom: 14px; }
    .link-item { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 16px; margin-bottom: 12px; }
    .link-name { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.95rem; margin-bottom: 10px; }
    .link-url { font-size: 0.75rem; color: var(--muted); margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .link-url span { color: var(--accent2); margin-right: 6px; }
    .link-actions { display: flex; gap: 8px; margin-top: 14px; }
    .btn-copy { flex: 1; background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: var(--text); padding: 10px; border-radius: 10px; font-size: 0.82rem; cursor: pointer; font-family: 'DM Sans', sans-serif; }
    .btn-copy.copied { background: rgba(34,197,94,0.15); border-color: var(--green); color: var(--green); }
    .btn-delete { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2); color: var(--red); padding: 10px 16px; border-radius: 10px; font-size: 0.82rem; cursor: pointer; font-family: 'DM Sans', sans-serif; }
    .empty { text-align: center; padding: 40px 20px; color: var(--muted); }
    .empty-icon { font-size: 40px; margin-bottom: 12px; }
    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--green); color: #fff; padding: 12px 24px; border-radius: 12px; font-size: 0.85rem; font-weight: 500; transition: transform 0.3s; z-index: 999; white-space: nowrap; }
    .toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>
<div class="header">
  <div class="header-logo">⚡</div>
  <div>
    <h1>Quản lý Link</h1>
    <p>Thêm, xóa link dễ dàng</p>
  </div>
</div>

<div class="add-form">
  <h2>➕ Thêm link mới</h2>
  <div class="form-group">
    <label>Tên link (để dễ nhớ)</label>
    <input type="text" id="inputName" placeholder="VD: Deal tối nay"/>
  </div>
  <div class="form-group">
    <label>🛒 Link Shopee Affiliate</label>
    <input type="url" id="inputShopee" placeholder="https://shope.ee/..."/>
  </div>
  <div class="form-group">
    <label>🔞 Link đích (clip/trang)</label>
    <input type="url" id="inputDest" placeholder="https://..."/>
  </div>
  <button class="btn-add" onclick="addLink()">✅ Tạo link</button>
</div>

<div class="list-header">📋 Danh sách link (<span id="listCount">0</span>)</div>
<div id="linkList"></div>
<div class="toast" id="toast"></div>

<script>
  const BASE = window.location.href.replace('admin-1.html', 'bridge-5.html');
  let links = JSON.parse(localStorage.getItem('mylinks') || '[]');

  function addLink() {
    const name = document.getElementById('inputName').value.trim();
    const shopee = document.getElementById('inputShopee').value.trim();
    const dest = document.getElementById('inputDest').value.trim();
    if (!name || !shopee || !dest) { showToast('⚠️ Điền đầy đủ 3 ô!'); return; }
    links.unshift({ name, shopee, dest, date: new Date().toLocaleDateString('vi') });
    localStorage.setItem('mylinks', JSON.stringify(links));
    document.getElementById('inputName').value = '';
    document.getElementById('inputShopee').value = '';
    document.getElementById('inputDest').value = '';
    render();
    showToast('✅ Đã tạo link!');
  }

  function deleteLink(i) {
    if (!confirm('Xóa link này?')) return;
    links.splice(i, 1);
    localStorage.setItem('mylinks', JSON.stringify(links));
    render();
    showToast('🗑️ Đã xóa!');
  }

  function copyLink(i, btnId) {
    const l = links[i];
    const url = BASE + '?s=' + encodeURIComponent(l.shopee) + '&d=' + encodeURIComponent(l.dest);
    navigator.clipboard.writeText(url).then(() => {
      const btn = document.getElementById(btnId);
      btn.textContent = '✓ Đã copy!';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = '📋 Copy link'; btn.classList.remove('copied'); }, 2500);
    });
  }

  function render() {
    document.getElementById('listCount').textContent = links.length;
    const list = document.getElementById('linkList');
    if (links.length === 0) {
      list.innerHTML = `<div class="empty"><div class="empty-icon">🔗</div><p>Chưa có link nào.<br/>Thêm link đầu tiên ở trên!</p></div>`;
      return;
    }
    list.innerHTML = links.map((l, i) => `
      <div class="link-item">
        <div class="link-name">${l.name} <span style="color:var(--muted);font-size:0.75rem;font-weight:400">${l.date}</span></div>
        <div class="link-url"><span>🛒</span>${l.shopee}</div>
        <div class="link-url"><span>🔞</span>${l.dest}</div>
        <div class="link-actions">
          <button class="btn-copy" id="btn_${i}" onclick="copyLink(${i},'btn_${i}')">📋 Copy link</button>
          <button class="btn-delete" onclick="deleteLink(${i})">🗑️</button>
        </div>
      </div>
    `).join('');
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  render();
</script>
</body>
</html>
