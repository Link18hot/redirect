<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Đang chuyển hướng...</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0d0d0d; --surface: #161616; --border: #2a2a2a;
      --accent: #ee4d2d; --accent2: #ff7337; --text: #f0f0f0; --muted: #777;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 24px;
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 20% 30%, rgba(238,77,45,0.12) 0%, transparent 70%),
        radial-gradient(ellipse 50% 60% at 80% 70%, rgba(255,115,55,0.08) 0%, transparent 70%);
      pointer-events: none;
    }
    body::after {
      content: ''; position: fixed; inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 48px 48px; opacity: 0.15; pointer-events: none;
    }
    .card {
      position: relative; z-index: 10;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 24px; padding: 44px 36px;
      max-width: 420px; width: 100%; text-align: center;
      box-shadow: 0 32px 64px rgba(0,0,0,0.5);
      animation: fadeUp 0.6s cubic-bezier(.16,1,.3,1) both;
    }
    @keyframes fadeUp {
      from{opacity:0;transform:translateY(24px)}
      to{opacity:1;transform:translateY(0)}
    }
    .logo {
      width: 90px; height: 90px; border-radius: 20px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px; font-size: 56px;
      box-shadow: 0 8px 24px rgba(238,77,45,0.4);
    }
    h1 {
      font-family: 'Syne', sans-serif; font-size: 1.6rem; font-weight: 800;
      line-height: 1.2; margin-bottom: 10px;
    }
    h1 span {
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .sub { color: var(--muted); font-size: 0.88rem; line-height: 1.6; margin-bottom: 32px; }
    .btn-shopee {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff; text-decoration: none;
      padding: 16px; border-radius: 14px; width: 100%;
      font-family: 'Syne', sans-serif; font-size: 1.05rem; font-weight: 800;
      box-shadow: 0 8px 24px rgba(238,77,45,0.4);
      transition: transform 0.2s, box-shadow 0.2s; margin-bottom: 14px;
    }
    .btn-shopee:hover { transform: translateY(-2px); }
    .divider {
      display: flex; align-items: center; gap: 12px;
      margin: 6px 0; color: var(--muted); font-size: 0.78rem;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }
    .btn-dest {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      background: rgba(255,255,255,0.05); border: 1px solid var(--border);
      color: var(--text); text-decoration: none;
      padding: 14px; border-radius: 14px; width: 100%;
      font-family: 'DM Sans', sans-serif; font-size: 0.95rem; font-weight: 500;
      transition: background 0.2s;
    }
    .btn-dest:hover { background: rgba(255,255,255,0.08); }
    .error {
      color: var(--muted); text-align: center; padding: 20px;
    }
  </style>
</head>
<body>
<div class="card" id="card">
  <div class="logo">🔞</div>
  <h1>Nội dung <span>18+</span><br/>dành cho bạn!</h1>
  <p class="sub" id="subText">Bấm vào Shopee để xem ưu đãi.<br/>Xem xong quay lại bấm vào trang chính.</p>
  <a class="btn-shopee" id="btnShopee" href="#">🛍️ Mở Shopee ngay</a>
  <div class="divider">sau khi xem xong</div>
  <a class="btn-dest" id="btnDest" href="#">🔞 Bấm để xem clip</a>
</div>

<script>
  // Đọc id từ URL: go.html?id=abc123
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');

  if (id) {
    // Lấy danh sách link từ localStorage (cùng domain)
    const links = JSON.parse(localStorage.getItem('links') || '[]');
    const link = links.find(l => l.id === id);
    if (link) {
      document.getElementById('btnShopee').href = link.shopee;
      document.getElementById('btnDest').href = link.dest;
    } else {
      document.getElementById('subText').textContent = 'Link không tồn tại hoặc đã bị xóa.';
      document.getElementById('btnShopee').style.display = 'none';
      document.getElementById('btnDest').style.display = 'none';
    }
  } else {
    document.getElementById('subText').textContent = 'Link không hợp lệ.';
    document.getElementById('btnShopee').style.display = 'none';
    document.getElementById('btnDest').style.display = 'none';
  }
</script>
</body>
</html>
