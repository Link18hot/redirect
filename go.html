<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nội dung 18+</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0d0d0d; --surface: #161616; --border: #2a2a2a;
      --accent: #ee4d2d; --accent2: #ff7337; --text: #f0f0f0; --muted: #777;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 24px;
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 20% 30%, rgba(238,77,45,0.12) 0%, transparent 70%),
        radial-gradient(ellipse 50% 60% at 80% 70%, rgba(255,115,55,0.08) 0%, transparent 70%);
      pointer-events: none;
    }
    body::after {
      content: ''; position: fixed; inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 48px 48px; opacity: 0.15; pointer-events: none;
    }
    .card {
      position: relative; z-index: 10;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 24px; padding: 44px 36px;
      max-width: 420px; width: 100%; text-align: center;
      box-shadow: 0 32px 64px rgba(0,0,0,0.5);
      animation: fadeUp 0.6s cubic-bezier(.16,1,.3,1) both;
    }
    @keyframes fadeUp {
      from{opacity:0;transform:translateY(24px)}
      to{opacity:1;transform:translateY(0)}
    }
    .logo {
      width: 90px; height: 90px; border-radius: 20px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px; font-size: 56px;
      box-shadow: 0 8px 24px rgba(238,77,45,0.4);
    }
    h1 {
      font-family: 'Syne', sans-serif; font-size: 1.6rem; font-weight: 800;
      line-height: 1.2; margin-bottom: 10px;
    }
    h1 span {
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .sub { color: var(--muted); font-size: 0.88rem; line-height: 1.6; margin-bottom: 32px; }
    .btn-dest {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff; text-decoration: none;
      padding: 18px; border-radius: 14px; width: 100%;
      font-family: 'Syne', sans-serif; font-size: 1.1rem; font-weight: 800;
      box-shadow: 0 8px 24px rgba(238,77,45,0.4);
      transition: transform 0.2s;
      animation: glow 1.5s ease-in-out infinite alternate;
    }
    @keyframes glow {
      from { box-shadow: 0 8px 24px rgba(238,77,45,0.4); }
      to   { box-shadow: 0 8px 40px rgba(238,77,45,0.7); }
    }
    .btn-dest:hover { transform: translateY(-2px); }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">🔞</div>
  <h1>Nội dung <span>18+</span><br/>dành cho bạn!</h1>
  <p class="sub">Cảm ơn đã xem Shopee! 🛒<br/>Bấm nút bên dưới để xem clip nhé.</p>
  <a class="btn-dest" id="btnDest" href="#">🔞 Bấm để xem clip</a>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const dest = params.get('d');

  if (dest) {
    document.getElementById('btnDest').href = decodeURIComponent(dest);
  } else {
    document.querySelector('.sub').textContent = 'Link không hợp lệ.';
    document.getElementById('btnDest').style.display = 'none';
  }
</script>
</body>
</html>
