<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Đang chuyển hướng...</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0d0d0d; --surface: #161616; --border: #2a2a2a;
      --accent: #ee4d2d; --accent2: #ff7337; --text: #f0f0f0;
      --muted: #777; --green: #22c55e;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      overflow: hidden; position: relative;
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 20% 30%, rgba(238,77,45,0.12) 0%, transparent 70%),
        radial-gradient(ellipse 50% 60% at 80% 70%, rgba(255,115,55,0.08) 0%, transparent 70%);
      pointer-events: none; animation: bgPulse 6s ease-in-out infinite alternate;
    }
    @keyframes bgPulse { from{opacity:.6} to{opacity:1} }
    body::after {
      content: ''; position: fixed; inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 48px 48px; opacity: 0.2; pointer-events: none;
    }
    .card {
      position: relative; z-index: 10;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 24px; padding: 48px 40px 40px;
      max-width: 460px; width: 92%; text-align: center;
      box-shadow: 0 0 80px rgba(238,77,45,0.08), 0 32px 64px rgba(0,0,0,0.5);
      animation: fadeUp 0.7s cubic-bezier(.16,1,.3,1) both;
    }
    @keyframes fadeUp {
      from{opacity:0;transform:translateY(32px) scale(.97)}
      to{opacity:1;transform:translateY(0) scale(1)}
    }
    .logo {
      width: 56px; height: 56px; border-radius: 14px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px; font-size: 28px;
      box-shadow: 0 8px 24px rgba(238,77,45,0.4);
    }
    h1 {
      font-family: 'Syne', sans-serif; font-size: 1.5rem; font-weight: 800;
      letter-spacing: -0.02em; line-height: 1.2; margin-bottom: 8px;
    }
    h1 span {
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .subtitle { color: var(--muted); font-size: 0.88rem; margin-bottom: 32px; line-height: 1.6; }
    .timer-wrap { position: relative; width: 110px; height: 110px; margin: 0 auto 28px; }
    .timer-wrap svg { transform: rotate(-90deg); width: 100%; height: 100%; }
    .timer-track { fill: none; stroke: var(--border); stroke-width: 6; }
    .timer-progress {
      fill: none; stroke: url(#grad); stroke-width: 6;
      stroke-linecap: round; transition: stroke-dashoffset 1s linear;
    }
    .timer-number {
      position: absolute; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    .timer-number .num {
      font-family: 'Syne', sans-serif; font-size: 2.2rem; font-weight: 800; line-height: 1;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .timer-number .lbl { font-size: 0.65rem; color: var(--muted); letter-spacing:.1em; text-transform:uppercase; margin-top:2px; }
    .status-bar {
      background: rgba(238,77,45,0.08); border: 1px solid rgba(238,77,45,0.2);
      border-radius: 10px; padding: 11px 16px; font-size: 0.82rem; color: var(--accent2);
      margin-bottom: 20px; display: flex; align-items: center; gap: 8px; justify-content: center;
    }
    .dot {
      width: 7px; height: 7px; border-radius: 50%; background: var(--accent);
      animation: blink 1.2s ease-in-out infinite; flex-shrink: 0;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }
    .steps { margin-bottom: 24px; display: flex; flex-direction: column; gap: 10px; }
    .step {
      display: flex; align-items: center; gap: 12px;
      background: rgba(255,255,255,0.03); border: 1px solid var(--border);
      border-radius: 10px; padding: 10px 14px; text-align: left;
    }
    .step-num {
      width: 26px; height: 26px; border-radius: 50%; flex-shrink: 0;
      background: var(--border); color: var(--muted);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.75rem; font-weight: 700; font-family: 'Syne', sans-serif;
      transition: all 0.4s;
    }
    .step-num.done { background: var(--green); color: #fff; }
    .step-num.active { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; }
    .step-text { font-size: 0.82rem; color: var(--muted); transition: color 0.4s; }
    .step-text.active { color: var(--text); }
    .main-btn {
      display: none;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff; border: none; padding: 15px 36px; border-radius: 12px;
      font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 700;
      cursor: pointer; width: 100%; letter-spacing: 0.01em;
      box-shadow: 0 8px 24px rgba(238,77,45,0.35);
      transition: transform 0.2s, box-shadow 0.2s;
      text-decoration: none; text-align: center;
    }
    .main-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(238,77,45,0.45); }
    .footer { position: relative; z-index: 10; margin-top: 20px; font-size: 0.7rem; color: #444; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">🛒</div>
  <h1>Xem <span>ưu đãi</span> Shopee</h1>
  <p class="subtitle">Shopee đang mở...<br/>Xem xong quay lại đây để vào trang chính.</p>
  <div class="timer-wrap">
    <svg viewBox="0 0 110 110" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#ee4d2d"/>
          <stop offset="100%" style="stop-color:#ff7337"/>
        </linearGradient>
      </defs>
      <circle class="timer-track" cx="55" cy="55" r="48"/>
      <circle class="timer-progress" id="progressCircle" cx="55" cy="55" r="48"/>
    </svg>
    <div class="timer-number">
      <span class="num" id="countDisplay">10</span>
      <span class="lbl">giây</span>
    </div>
  </div>
  <div class="status-bar">
    <span class="dot"></span>
    <span id="statusText">Shopee đang mở, vui lòng chờ...</span>
  </div>
  <div class="steps">
    <div class="step">
      <div class="step-num done" id="s1">✓</div>
      <div class="step-text active">Shopee đã được mở</div>
    </div>
    <div class="step">
      <div class="step-num active" id="s2">2</div>
      <div class="step-text active" id="s2t">Chờ đếm ngược xong...</div>
    </div>
    <div class="step">
      <div class="step-num" id="s3">3</div>
      <div class="step-text" id="s3t">Bấm nút vào trang chính</div>
    </div>
  </div>
  <a class="main-btn" id="mainBtn" href="#">Vào trang chính →</a>
</div>
<p class="footer">Trang redirect · Shopee Affiliate</p>

<script>
  /* =============================================
     ⚙️  CHỈ SỬA 3 DÒNG NÀY — KHÔNG ĐỤNG GÌ KHÁC
  ============================================= */
  const LINK_AD   = "https://s.shopee.vn/900WwvvlC9";
  const LINK_DEST = "https://www.facebook.com/share/p/14W34cHFQys/";
  const COUNTDOWN = 10;
  /* ============================================= */

  window.open(LINK_AD, '_blank');

  const circle = document.getElementById('progressCircle');
  const countDisplay = document.getElementById('countDisplay');
  const statusText = document.getElementById('statusText');
  const mainBtn = document.getElementById('mainBtn');
  const s2 = document.getElementById('s2');
  const s2t = document.getElementById('s2t');
  const s3 = document.getElementById('s3');
  const s3t = document.getElementById('s3t');

  mainBtn.href = LINK_DEST;

  const r = 48;
  const circumference = 2 * Math.PI * r;
  circle.style.strokeDasharray = circumference;
  circle.style.strokeDashoffset = 0;

  let timeLeft = COUNTDOWN;
  countDisplay.textContent = timeLeft;

  const interval = setInterval(() => {
    timeLeft--;
    countDisplay.textContent = timeLeft;
    circle.style.strokeDashoffset = circumference * (1 - timeLeft / COUNTDOWN);
    if (timeLeft <= 3) statusText.textContent = 'Sắp xong rồi...';
    if (timeLeft <= 0) {
      clearInterval(interval);
      statusText.textContent = 'Xem xong! Bấm nút bên dưới 👇';
      s2.textContent = '✓'; s2.classList.remove('active'); s2.classList.add('done');
      s2t.textContent = 'Đã chờ xong';
      s3.classList.add('active'); s3t.classList.add('active');
      s3t.textContent = 'Bấm nút vào trang chính!';
      mainBtn.style.display = 'block';
    }
  }, 1000);
</script>
</body>
</html>
