<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Đang mở Shopee...</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root { --orange: #ee4d2d; --orange2: #ff7337; --bg: #0d0d0d; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); font-family: 'Outfit', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; }
    .bg-glow { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
    .bg-glow::before { content: ''; position: absolute; width: 600px; height: 600px; border-radius: 50%; background: radial-gradient(circle, rgba(238,77,45,0.12) 0%, transparent 70%); top: 50%; left: 50%; transform: translate(-50%, -50%); animation: breathe 3s ease-in-out infinite; }
    @keyframes breathe { 0%,100%{transform:translate(-50%,-50%) scale(1);opacity:.7} 50%{transform:translate(-50%,-50%) scale(1.2);opacity:1} }
    .container { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; gap: 36px; }
    .spinner-wrap { position: relative; width: 120px; height: 120px; }
    .ring { position: absolute; inset: 0; border-radius: 50%; border: 2px solid transparent; }
    .ring-outer { border-top-color: var(--orange); border-right-color: rgba(238,77,45,0.3); animation: spin 1.4s linear infinite; }
    .ring-mid { inset: 12px; border-bottom-color: var(--orange2); border-left-color: rgba(255,115,55,0.3); animation: spin 1s linear infinite reverse; }
    .ring-inner { inset: 26px; border-top-color: #fff; border-right-color: rgba(255,255,255,0.2); animation: spin 0.7s linear infinite; }
    @keyframes spin { to{transform:rotate(360deg)} }
    .icon-center { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 32px; animation: iconPulse 1.4s ease-in-out infinite; }
    @keyframes iconPulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.15)} }
    .progress-wrap { width: 200px; display: flex; flex-direction: column; align-items: center; gap: 10px; }
    .progress-bar { width: 100%; height: 3px; background: rgba(255,255,255,0.07); border-radius: 99px; overflow: hidden; }
    .progress-fill { height: 100%; width: 0%; border-radius: 99px; background: linear-gradient(90deg, var(--orange), var(--orange2)); box-shadow: 0 0 10px rgba(238,77,45,0.6); animation: fillBar 1.2s ease-out forwards; }
    @keyframes fillBar { 0%{width:0%} 40%{width:55%} 80%{width:85%} 100%{width:100%} }
    .text-wrap { display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .text-main { font-size: 1.05rem; font-weight: 600; color: #f0f0f0; letter-spacing: 0.01em; }
    .text-sub { font-size: 0.78rem; font-weight: 300; color: rgba(255,255,255,0.3); letter-spacing: 0.04em; }
    .dots { display: inline-flex; gap: 4px; margin-left: 2px; }
    .dots span { display: inline-block; width: 4px; height: 4px; border-radius: 50%; background: rgba(255,255,255,0.5); animation: dot 1.2s ease-in-out infinite; }
    .dots span:nth-child(2){animation-delay:0.2s} .dots span:nth-child(3){animation-delay:0.4s}
    @keyframes dot { 0%,80%,100%{transform:scale(1);opacity:.4} 40%{transform:scale(1.4);opacity:1} }
    .particles { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
    .particle { position: absolute; width: 2px; height: 2px; border-radius: 50%; background: var(--orange); opacity: 0; animation: floatUp var(--dur) ease-in infinite; animation-delay: var(--delay); left: var(--x); bottom: -10px; }
    @keyframes floatUp { 0%{opacity:0;transform:translateY(0) scale(1)} 10%{opacity:.6} 90%{opacity:.1} 100%{opacity:0;transform:translateY(-80vh) scale(0.3)} }
    .error-state { display: none; flex-direction: column; align-items: center; gap: 12px; text-align: center; }
    .error-icon { font-size: 40px; }
    .error-text { color: rgba(255,255,255,0.5); font-size: 0.85rem; font-weight: 300; }
  </style>
</head>
<body>
<div class="bg-glow"></div>
<div class="particles" id="particles"></div>

<div class="container" id="loadingState">
  <div class="spinner-wrap">
    <div class="ring ring-outer"></div>
    <div class="ring ring-mid"></div>
    <div class="ring ring-inner"></div>
    <div class="icon-center">🛍️</div>
  </div>
  <div class="text-wrap">
    <div class="text-main">Đang mở Shopee<span class="dots"><span></span><span></span><span></span></span></div>
    <div class="text-sub">Vui lòng chờ trong giây lát</div>
  </div>
  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill"></div></div>
  </div>
</div>

<div class="container error-state" id="errorState">
  <div class="error-icon">⚠️</div>
  <div class="text-main">Link không hợp lệ</div>
  <div class="error-text">Link đã hết hạn hoặc bị lỗi.</div>
</div>

<script>
  const pc = document.getElementById('particles');
  for (let i = 0; i < 18; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.setProperty('--x', Math.random() * 100 + 'vw');
    p.style.setProperty('--dur', (4 + Math.random() * 5) + 's');
    p.style.setProperty('--delay', (Math.random() * 5) + 's');
    pc.appendChild(p);
  }
  const params = new URLSearchParams(window.location.search);
  const shopee = params.get('s');
  const dest = params.get('d');
  if (shopee && dest) {
    window.location.href = decodeURIComponent(shopee);
    setTimeout(() => { window.location.replace(decodeURIComponent(dest)); }, 1200);
  } else {
    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('errorState').style.display = 'flex';
  }
</script>
</body>
</html>
