<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Đang mở Shopee...</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d0d0d; color: #f0f0f0;
      font-family: sans-serif;
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; text-align: center; padding: 24px;
    }
    .logo { font-size: 64px; margin-bottom: 20px; animation: pulse 1s ease-in-out infinite alternate; }
    @keyframes pulse { from{transform:scale(1)} to{transform:scale(1.08)} }
    p { color: #777; font-size: 0.9rem; }
  </style>
</head>
<body>
  <div class="logo">🛍️</div>
  <p id="status">Vui lòng đợi trong giây lát...</p>

<script>
  // Lấy link Shopee (s) và Link Đích (d) từ URL
  const params = new URLSearchParams(window.location.search);
  const shopee = params.get('s');
  const dest = params.get('d');

  if (shopee && dest) {
    const decodedShopee = decodeURIComponent(shopee);
    const decodedDest = decodeURIComponent(dest);

    // 1. Gửi lệnh mở ứng dụng Shopee ngay lập tức
    window.location.href = decodedShopee;

    // 2. Chuyển hướng trang hiện tại sang link đích sau 1.2 giây
    // Khi khách đóng Shopee, trình duyệt sẽ hiển thị Link đích này.
    setTimeout(() => {
      window.location.replace(decodedDest);
    }, 1200);

  } else {
    document.getElementById('status').textContent = '⚠️ Link không hợp lệ hoặc đã hết hạn.';
  }
</script>
</body>
</html>
